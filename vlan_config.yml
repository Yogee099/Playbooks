---
- name: Configure VLANs on Cisco Switch
  hosts: Cisco
  gather_facts: no
  connection: network_cli

  tasks:
    - name: "1010 PRE CHECKS "
      import_tasks: tasks/checks.yml
      register: ver
    
    - name: "1020 display PRE CHECKS"
      debug:
        var: ver["stdout_lines"]

    - name: Generate VLAN configuration from template
      ansible.builtin.template:
        src: templates/vlans.j2
        dest: /tmp/{{ inventory_hostname }}_vlans.txt
      delegate_to: localhost

    - name: Push VLAN configuration to switch
      cisco.ios.ios_config:
        src: /tmp/{{ inventory_hostname }}_vlans.txt

    - name: " POST CHECKS "
      import_tasks: tasks/checks.yml
      register: ver
    
    - name: "1050 POST CHECKS"
      debug:
        var: ver["stdout_lines"]     
